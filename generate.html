<!DOCTYPE html>
<html>
<head>
  <title>Generate Phase Cards</title>
  <style>
    body { font-family: sans-serif; padding: 16px; font-size: 14px; background: #fff; }
    button { padding: 8px 16px; background: #0079bf; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 14px; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin-top: 10px; color: #555; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <button id="btn" onclick="generate()">Generate Phase Cards</button>
  <div id="status"></div>

<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script>
const API_KEY = 'fa57f1ac4238ca2d66c78062d4493fd1';

const t = TrelloPowerUp.iframe({
  appKey: API_KEY,
  appName: 'Phase Generator'
});

function parseDateRange(str) {
  // Match dates with or without year: "4/20" or "4/20/26" or "4/20/2026"
  const datePattern = '(\\d{1,2}\\/\\d{1,2}(?:\\/\\d{2,4})?)';
  const match = str.match(new RegExp(datePattern + '\\s*-\\s*' + datePattern));
  if (!match) return null;

  const toISO = (d) => {
    const parts = d.split('/');
    const m = parseInt(parts[0]);
    const day = parseInt(parts[1]);
    let year;
    if (parts[2]) {
      // Year provided
      year = parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2]);
    } else {
      // No year — use next occurrence of that date
      const now = new Date();
      const candidate = new Date(Date.UTC(now.getUTCFullYear(), m - 1, day));
      // If the date has already passed today, use next year
      const today = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
      year = candidate >= today ? now.getUTCFullYear() : now.getUTCFullYear() + 1;
    }
    return new Date(Date.UTC(year, m - 1, day, 12, 0, 0));
  };

  return { start: toISO(match[1]), due: toISO(match[2]) };
}

async function generate() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Starting...';

  try {
    // Authorize and get token
    const restApi = t.getRestApi();
    await restApi.authorize({ scope: 'read,write', expiration: 'never' });
    const token = await restApi.getToken();

    // Get card context directly from the iframe
    const context = t.getContext();
    const cardId = context.card;
    const boardId = context.board;

    if (!cardId) {
      status.textContent = '❌ Could not read card data.';
      btn.disabled = false;
      return;
    }

    status.textContent = 'Reading card...';

    // Fetch card details
    const cardRes = await fetch(
      `https://api.trello.com/1/cards/${cardId}?key=${API_KEY}&token=${token}`
    );
    const card = await cardRes.json();

    status.textContent = 'Reading checklists...';

    const clRes = await fetch(
      `https://api.trello.com/1/cards/${cardId}/checklists?key=${API_KEY}&token=${token}`
    );
    const checklists = await clRes.json();

    const phaseChecklist = checklists.find(cl => cl.name.toLowerCase() === 'phases');
    if (!phaseChecklist) {
      status.textContent = '❌ No checklist named "Phases" found on this card.';
      btn.disabled = false;
      return;
    }

    const items = phaseChecklist.checkItems;
    if (!items.length) {
      status.textContent = '❌ The Phases checklist has no items.';
      btn.disabled = false;
      return;
    }

    const listsRes = await fetch(
      `https://api.trello.com/1/boards/${boardId}/lists?key=${API_KEY}&token=${token}`
    );
    const lists = await listsRes.json();

    // Find the list whose date range contains the given start date
    // List names are formatted like "3/30 - 4/5" or "4/6 - 4-12"
    function getWeekList(startDate) {
      const target = new Date(startDate);
      target.setUTCHours(0,0,0,0);

      for (const list of lists) {
        // Match patterns like "3/30 - 4/5" or "4/6 - 4-12"
        const match = list.name.match(/^(\d{1,2})[\/\-](\d{1,2})\s*[-–]\s*(\d{1,2})[\/\-](\d{1,2})$/);
        if (!match) continue;

        const [, sm, sd, em, ed] = match;

        // Determine year — assume current year, handle Dec/Jan rollover
        const now = new Date();
        const year = now.getUTCFullYear();

        let startOfWeek = new Date(Date.UTC(year, parseInt(sm) - 1, parseInt(sd)));
        let endOfWeek = new Date(Date.UTC(year, parseInt(em) - 1, parseInt(ed)));

        // Handle year rollover (e.g. Dec -> Jan)
        if (endOfWeek < startOfWeek) endOfWeek.setUTCFullYear(year + 1);

        if (target >= startOfWeek && target <= endOfWeek) {
          return list;
        }
      }
      return null;
    }

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const itemName = item.name.trim();
      status.textContent = `Creating card ${i + 1} of ${items.length}: ${itemName}`;

      // Skip items already linked (already a markdown link)
      if (itemName.startsWith('[')) {
        status.textContent = `⏭️ Skipping "${itemName}" — already linked.`;
        await new Promise(r => setTimeout(r, 500));
        continue;
      }

      const dates = parseDateRange(itemName);
      if (!dates) {
        status.textContent = `⚠️ Skipping "${itemName}" — no valid date range found.`;
        await new Promise(r => setTimeout(r, 1500));
        continue;
      }

      const targetList = getWeekList(dates.start);
      if (!targetList) {
        status.textContent = `⚠️ Skipping "${itemName}" — no matching week list found for that start date.`;
        await new Promise(r => setTimeout(r, 1500));
        continue;
      }

      const childName = `[PHASE] ${card.name} — ${itemName}`;

      // Fetch parent attachments
      const attachRes = await fetch(
        `https://api.trello.com/1/cards/${cardId}/attachments?key=${API_KEY}&token=${token}`
      );
      const attachments = await attachRes.json();

      // Fetch parent custom fields
      const cfRes = await fetch(
        `https://api.trello.com/1/cards/${cardId}/customFieldItems?key=${API_KEY}&token=${token}`
      );
      const customFields = await cfRes.json();

      // Build child description: parent link first, then parent desc
      const parentDesc = card.desc ? '\n\n' + card.desc : '';
      const childDesc = `⬆️ Parent card: ${card.url}${parentDesc}`;

      // Get label IDs from parent card
      const labelIds = card.idLabels || [];

      const createRes = await fetch(`https://api.trello.com/1/cards`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          key: API_KEY, token,
          idList: targetList.id,
          name: childName,
          start: dates.start.toISOString(),
          due: dates.due.toISOString(),
          desc: childDesc,
          idLabels: labelIds,
          idMembers: card.idMembers || []
        })
      });
      const child = await createRes.json();

      // Add light grey cover to child card
      await fetch(`https://api.trello.com/1/cards/${child.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          key: API_KEY, token,
          cover: { color: 'sky', brightness: 'light', size: 'full' }
        })
      });

      // Add comment to child card
      await fetch(`https://api.trello.com/1/cards/${child.id}/actions/comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          key: API_KEY, token,
          text: '⚠️ PHASE CARD - PUT COMMENTS ON PRIMARY CARD'
        })
      });

      // Copy attachments to child card (skip Trello card attachments which have no url)
      for (const att of attachments) {
        if (!att.url) continue;
        await fetch(`https://api.trello.com/1/cards/${child.id}/attachments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: API_KEY, token, url: att.url, name: att.name })
        });
      }

      // Copy custom fields to child card
      for (const cf of customFields) {
        await fetch(`https://api.trello.com/1/card/${child.id}/customField/${cf.idCustomField}/item`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: API_KEY, token, value: cf.value, idValue: cf.idValue || undefined })
        });
      }

      // Update checklist item name to be a hyperlink to the child card
      await fetch(`https://api.trello.com/1/cards/${cardId}/checkItem/${item.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          key: API_KEY, token,
          name: `[${itemName}](${child.url})`
        })
      });
    }

    status.textContent = `✅ Done! Phase cards created and checklist items linked.`;

  } catch (err) {
    status.textContent = `❌ Error: ${err.message}`;
    console.error(err);
    btn.disabled = false;
  }
}
</script>
</body>
</html>
