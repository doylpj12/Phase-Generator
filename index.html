<!DOCTYPE html>
<html>
<head><title>Phase Card Generator Power-Up</title></head>
<body>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script>
const API_KEY = 'fa57f1ac4238ca2d66c78062d4493fd1';

TrelloPowerUp.initialize({
  'card-buttons': function(t) {
    return [{
      icon: 'https://cdn.iconscout.com/icon/free/png-256/free-trello-226534.png',
      text: 'Generate Phase Cards',
      callback: function(t) {
        return t.popup({
          title: 'Generate Phase Cards',
          url: './generate.html',
          height: 120
        });
      }
    }];
  }
}, {
  appKey: API_KEY,
  appName: 'Phase Generator'
});
</script>
</body>
</html>
