<!DOCTYPE html>
<html>
<head>
  <title>Generate Phase Cards</title>
  <style>
    body { font-family: sans-serif; padding: 16px; font-size: 14px; background: #fff; }
    button { padding: 8px 16px; background: #0079bf; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 14px; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin-top: 10px; color: #555; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <button id="btn" onclick="generate()">Generate Phase Cards</button>
  <div id="status"></div>

<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script>
const API_KEY = 'fa57f1ac4238ca2d66c78062d4493fd1';

const t = TrelloPowerUp.iframe({
  appKey: API_KEY,
  appName: 'Phase Generator'
});

function parseDateRange(str) {
  const match = str.match(/(\d{1,2}\/\d{1,2}\/\d{2,4})\s*-\s*(\d{1,2}\/\d{1,2}\/\d{2,4})/);
  if (!match) return null;
  const toISO = (d) => {
    const [m, day, y] = d.split('/');
    const year = y.length === 2 ? '20' + y : y;
    return new Date(`${year}-${m.padStart(2,'0')}-${day.padStart(2,'0')}T12:00:00.000Z`);
  };
  return { start: toISO(match[1]), due: toISO(match[2]) };
}

async function generate() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Starting...';

  try {
    // Authorize and get token
    const restApi = t.getRestApi();
    await restApi.authorize({ scope: 'read,write', expiration: 'never' });
    const token = await restApi.getToken();

    // Get card context directly from the iframe
    const context = t.getContext();
    const cardId = context.card;
    const boardId = context.board;

    if (!cardId) {
      status.textContent = '❌ Could not read card data.';
      btn.disabled = false;
      return;
    }

    status.textContent = 'Reading card...';

    // Fetch card details
    const cardRes = await fetch(
      `https://api.trello.com/1/cards/${cardId}?key=${API_KEY}&token=${token}`
    );
    const card = await cardRes.json();

    status.textContent = 'Reading checklists...';

    const clRes = await fetch(
      `https://api.trello.com/1/cards/${cardId}/checklists?key=${API_KEY}&token=${token}`
    );
    const checklists = await clRes.json();

    const phaseChecklist = checklists.find(cl => cl.name.toLowerCase() === 'phases');
    if (!phaseChecklist) {
      status.textContent = '❌ No checklist named "Phases" found on this card.';
      btn.disabled = false;
      return;
    }

    const items = phaseChecklist.checkItems;
    if (!items.length) {
      status.textContent = '❌ The Phases checklist has no items.';
      btn.disabled = false;
      return;
    }

    const listsRes = await fetch(
      `https://api.trello.com/1/boards/${boardId}/lists?key=${API_KEY}&token=${token}`
    );
    const lists = await listsRes.json();

    let targetList = lists.find(l => l.name.toLowerCase() === 'phases');
    if (!targetList) {
      targetList = lists.find(l => l.id === card.idList);
    }

    const childLinks = [];

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const itemName = item.name.trim();
      status.textContent = `Creating card ${i + 1} of ${items.length}: ${itemName}`;

      const dates = parseDateRange(itemName);
      if (!dates) {
        status.textContent = `⚠️ Skipping "${itemName}" — no valid date range found.`;
        await new Promise(r => setTimeout(r, 1500));
        continue;
      }

      const childName = `${card.name} — ${itemName}`;

      const createRes = await fetch(`https://api.trello.com/1/cards`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          key: API_KEY, token,
          idList: targetList.id,
          name: childName,
          start: dates.start.toISOString(),
          due: dates.due.toISOString(),
          desc: `⬆️ Parent card: ${card.url}`
        })
      });
      const child = await createRes.json();

      await fetch(`https://api.trello.com/1/cards/${child.id}/attachments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: API_KEY, token, url: card.url, name: `⬆️ Parent: ${card.name}` })
      });

      childLinks.push({ url: child.url, name: `⬇️ ${itemName}` });
    }

    if (childLinks.length > 0) {
      status.textContent = 'Linking phase cards back to parent...';
      for (const link of childLinks) {
        await fetch(`https://api.trello.com/1/cards/${cardId}/attachments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: API_KEY, token, url: link.url, name: link.name })
        });
      }
    }

    status.textContent = `✅ Done! Created ${childLinks.length} phase card${childLinks.length !== 1 ? 's' : ''}.`;

  } catch (err) {
    status.textContent = `❌ Error: ${err.message}`;
    console.error(err);
    btn.disabled = false;
  }
}
</script>
</body>
</html>
